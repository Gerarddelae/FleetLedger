version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fleetledger-db
    environment:
      POSTGRES_DB: fleetledger
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleetledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetledger-api
    environment:
      ConnectionStrings__Default: "Host=db;Database=fleetledger;Username=fleet;Password=fleet"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: